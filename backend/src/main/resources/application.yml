server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: campus-lost-and-found

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: campus-lost-and-found-secret-key-2024-very-long-secret
  expire: 604800000

upload:
  path: ./uploads
  allowed-types: jpg,jpeg,png,webp
  max-size: 5242880

logging:
  level:
    com.campus.lostfound: debug
    org.springframework.web: info
